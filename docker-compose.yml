services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: debot
      POSTGRES_USER: debot
      POSTGRES_PASSWORD: debot_dev
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
